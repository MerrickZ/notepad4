name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [Win32, x64, ARM64]
        configuration: [Release]

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Install NSIS
      uses: negrutiu/nsis-install@v2

    - name: Build project
      run: |
        $outDir = "build/bin/${{ matrix.configuration }}/${{ matrix.platform }}"
        msbuild build/VisualStudio/Notepad4.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} /p:OutDir=$outDir\ /verbosity:minimal

    - name: Debug - List directory structure after build
      run: |
        Get-ChildItem -Path "." -Recurse -File | Where-Object { $_.Name -match "\.exe$" } | Select-Object FullName

    - name: Create output directory
      run: |
        New-Item -ItemType Directory -Path "output/${{ matrix.platform }}" -Force

    - name: Copy built files
      run: |
        # Try different possible output directories
        $possibleDirs = @(
          "build/bin/${{ matrix.configuration }}/${{ matrix.platform }}",
          "bin/${{ matrix.configuration }}/${{ matrix.platform }}",
          "build/VisualStudio/${{ matrix.configuration }}/${{ matrix.platform }}",
          "${{ matrix.configuration }}/${{ matrix.platform }}"
        )
        
        $srcDir = $null
        foreach ($dir in $possibleDirs) {
          if (Test-Path "$dir\Notepad4.exe") {
            $srcDir = $dir
            break
          }
        }
        
        if ($srcDir) {
          Write-Host "Found Notepad4.exe in: $srcDir"
          $destDir = "output/${{ matrix.platform }}"
          Copy-Item -Path "$srcDir\Notepad4.exe" -Destination "$destDir"
          Copy-Item -Path "$srcDir\matepath.exe" -Destination "$destDir"
        } else {
          Write-Error "Could not find Notepad4.exe in any of the possible directories"
          exit 1
        }

    - name: Debug - List output directory contents
      run: |
        Get-ChildItem -Path "output/${{ matrix.platform }}" -File | Select-Object Name

    - name: Build NSIS installer
      run: |
        $platform = "${{ matrix.platform }}"
        $arch = if ($platform -eq "Win32") { "x86" } elseif ($platform -eq "x64") { "x64" } else { "arm64" }
        $version = if ("${{ github.ref }}" -like "refs/tags/*") { "${{ github.ref_name }}" } else { "dev" }
        $outputFile = "output\Notepad4-${version}-${arch}.exe"
        $sourceDir = "output\${platform}"
        
        makensis /DVERSION="$version" /DARCH="$arch" /DOUTPUT_FILE="$outputFile" /DSOURCE_DIR="$sourceDir" build\Notepad4.nsi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Notepad4-${{ matrix.platform }}
        path: output/Notepad4-*.exe

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/**/*.exe
        name: Release ${{ github.ref_name }}
        body: |
          ## Notepad4 ${{ github.ref_name }}
          
          ### Changes
          - See commit history for details
          
          ### Download
          - Windows x86: Notepad4-${{ github.ref_name }}-x86.exe
          - Windows x64: Notepad4-${{ github.ref_name }}-x64.exe
          - Windows ARM64: Notepad4-${{ github.ref_name }}-arm64.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}